{% extends "website/staff/base.html" %}

{% block staff_header_actions %}
  <a class="btn portal-btn-outline btn-sm" href="{% url 'std_list' %}">
    Back to snapshot
  </a>
{% endblock %}

{% block staff_content %}
  <div class="portal-panel-card">
    <div class="portal-panel-card__stripe"></div>
    <div class="portal-panel-card__body">
      <h2 class="h5 mb-3">{{ student.long_name }}</h2>
      <dl class="row mb-0">
        <dt class="col-sm-4">Student ID</dt>
        <dd class="col-sm-8">{{ student.student_id }}</dd>
        <dt class="col-sm-4">Email</dt>
        <dd class="col-sm-8">{{ student.email|default:"Not set" }}</dd>
        <dt class="col-sm-4">Curriculum</dt>
        <dd class="col-sm-8">{{ student.primary_curriculum }}</dd>
      </dl>
    </div>
  </div>
{% endblock %}
