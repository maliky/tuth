<aside class="portal-actions-panel">
  <div class="portal-actions-panel__header">
    <p class="eyebrow text-uppercase mb-1">Next actions</p>
    <h2>What can I do here?</h2>
  </div>
  <div class="staff-dashboard__secondary">
    {% if actions %}
      {% for action in actions %}
        <article class="action-card">
          <p class="action-card__label">
            <span class="action-card__cue {% if action.is_admin %}is-admin{% else %}is-app{% endif %}"></span>
            {{ action.description }}
          </p>
          <a
            class="btn {% if action.is_admin %}portal-btn-outline{% else %}portal-btn-accent{% endif %} w-100"
            href="{{ action.href }}"
          >
            {{ action.label }}
          </a>
        </article>
      {% endfor %}
    {% else %}
      <article class="action-card action-card--empty">
        <p>No quick actions right now.</p>
      </article>
    {% endif %}
  </div>
</aside>
