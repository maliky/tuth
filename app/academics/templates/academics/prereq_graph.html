{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prerequisite Graph</title>
    <link rel="icon" href="{% static 'favicon.ico' %}" />
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f8f9fa;
        color: #212529;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: #ffffff;
        border-bottom: 1px solid #dee2e6;
      }
      header h1 {
        font-size: 18px;
        margin: 0;
      }
      header .actions a {
        margin-left: 12px;
        text-decoration: none;
        color: #0d6efd;
        font-size: 14px;
      }
      header .actions button {
        margin-left: 12px;
        border: 1px solid #ced4da;
        background: #ffffff;
        color: #0d6efd;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      header .actions button:hover {
        border-color: #adb5bd;
        color: #0b5ed7;
      }
      header .actions label {
        margin-left: 12px;
        font-size: 13px;
        color: #495057;
      }
      header .actions select {
        margin-left: 6px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 13px;
        background: #ffffff;
        color: #0d6efd;
      }
      #graph-error {
        margin: 12px 24px 0;
        padding: 10px 14px;
        background: #fff3cd;
        border: 1px solid #ffecb5;
        color: #664d03;
        border-radius: 6px;
        font-size: 14px;
        display: none;
      }
      .graph-pane {
        width: 100%;
        height: calc(100vh - 64px);
        background: #ffffff;
      }
      .graph-pane.is-hidden {
        display: none;
      }
      #graph-elk {
        position: relative;
      }
      #graph-elk .cytoscape-container {
        position: relative;
        z-index: 1;
      }
      .graph-bands {
        position: absolute;
        inset: 0;
        display: flex;
        z-index: 0;
        pointer-events: none;
      }
      .graph-band {
        flex: 1;
        position: relative;
        border-right: 1px solid #e9ecef;
      }
      .graph-band:nth-child(odd) {
        background: #f8f9fa;
      }
      .graph-band:nth-child(even) {
        background: #ffffff;
      }
      .graph-band:last-child {
        border-right: none;
      }
      .graph-band-label {
        position: absolute;
        top: 10px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        color: #6c757d;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .node rect,
      .node ellipse,
      .node polygon,
      .node path {
        fill: #ffffff;
        stroke-width: 2px;
        stroke-linejoin: round;
      }
      .node text {
        font-size: 12px;
        fill: #212529;
        pointer-events: none;
      }
      .link {
        fill: none;
        stroke: #adb5bd;
        stroke-width: 1.6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Prerequisite Graph – {{ slug }}</h1>
      <div class="actions">
        <label for="layout-select">Layout</label>
        <select id="layout-select">
          <option value="elk">ELK (layered)</option>
          <option value="force">Force</option>
          <option value="dag">DAG (d3-dag)</option>
        </select>
        <a href="{{ json_url }}">Download JSON</a>
        <a href="{{ dot_url }}">Download DOT</a>
        <a href="{{ png_url }}">Download PNG</a>
      </div>
    </header>
    <div id="graph-error"></div>
    <svg
      id="graph-d3"
      class="graph-pane"
      data-json-url="{{ json_url }}"
    ></svg>
    <div
      id="graph-elk"
      class="graph-pane"
      data-json-url="{{ json_url }}"
    ></div>

    <script
      defer
      src="{% static 'build/academics/static/academics/js/prereq_graph_layout_switcher.js' %}"
    ></script>
    <script defer src="{% static 'academics/js/d3.v7.min.js' %}"></script>
    <script defer src="{% static 'academics/js/d3-dag.iife.min.js' %}"></script>
    <script
      defer
      src="{% static 'build/academics/static/academics/js/prereq_graph_viewer.js' %}"
    ></script>
    <script
      defer
      src="{% static 'academics/js/cytoscape.3.33.1.min.js' %}"
    ></script>
    <script defer src="{% static 'academics/js/elkjs.0.11.0.bundled.js' %}"></script>
    <script
      defer
      src="{% static 'academics/js/cytoscape-elk.2.3.0.js' %}"
    ></script>
    <script
      defer
      src="{% static 'build/academics/static/academics/js/prereq_graph_viewer_elk.js' %}"
    ></script>
  </body>
</html>
