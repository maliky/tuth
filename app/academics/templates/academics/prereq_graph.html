{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prerequisite Graph</title>
    <link rel="icon" href="{% static 'favicon.ico' %}" />
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f8f9fa;
        color: #212529;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: #ffffff;
        border-bottom: 1px solid #dee2e6;
      }
      header h1 {
        font-size: 18px;
        margin: 0;
      }
      header .actions a {
        margin-left: 12px;
        text-decoration: none;
        color: #0d6efd;
        font-size: 14px;
      }
      header .actions button {
        margin-left: 12px;
        border: 1px solid #ced4da;
        background: #ffffff;
        color: #0d6efd;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      header .actions button:hover {
        border-color: #adb5bd;
        color: #0b5ed7;
      }
      #graph-error {
        margin: 12px 24px 0;
        padding: 10px 14px;
        background: #fff3cd;
        border: 1px solid #ffecb5;
        color: #664d03;
        border-radius: 6px;
        font-size: 14px;
        display: none;
      }
      #graph {
        width: 100%;
        height: calc(100vh - 64px);
      }
      .node rect,
      .node ellipse,
      .node polygon,
      .node path {
        fill: #ffffff;
        stroke-width: 2px;
        stroke-linejoin: round;
      }
      .node text {
        font-size: 12px;
        fill: #212529;
        pointer-events: none;
      }
      .link {
        fill: none;
        stroke: #adb5bd;
        stroke-width: 1.6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Prerequisite Graph – {{ slug }}</h1>
      <div class="actions">
        <button type="button" id="layout-toggle">Switch to DAG layout</button>
        <a href="{{ json_url }}">Download JSON</a>
        <a href="{{ dot_url }}">Download DOT</a>
        <a href="{{ png_url }}">Download PNG</a>
      </div>
    </header>
    <div id="graph-error"></div>
    <svg id="graph" data-json-url="{{ json_url }}"></svg>

    <script defer src="{% static 'academics/js/d3.v7.min.js' %}"></script>
    <script defer src="{% static 'academics/js/d3-dag.iife.min.js' %}"></script>
    <script
      defer
      src="{% static 'academics/js/prereq_graph_viewer.js' %}"
    ></script>
  </body>
</html>
