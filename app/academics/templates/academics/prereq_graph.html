<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prerequisite Graph</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f8f9fa;
        color: #212529;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: #ffffff;
        border-bottom: 1px solid #dee2e6;
      }
      header h1 {
        font-size: 18px;
        margin: 0;
      }
      header .actions a {
        margin-left: 12px;
        text-decoration: none;
        color: #0d6efd;
        font-size: 14px;
      }
      #graph {
        width: 100%;
        height: calc(100vh - 64px);
      }
      .node rect,
      .node ellipse {
        fill: #ffffff;
        stroke-width: 2px;
      }
      .node text {
        font-size: 12px;
        fill: #212529;
        pointer-events: none;
      }
      .link {
        fill: none;
        stroke: #adb5bd;
        stroke-width: 1.6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Prerequisite Graph – {{ slug }}</h1>
      <div class="actions">
        <a href="{{ json_url }}">Download JSON</a>
        <a href="{{ png_url }}">Download PNG</a>
      </div>
    </header>
    <svg id="graph"></svg>

    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/d3-dag@0.6.4"></script>
    <script src="{{ js_url }}"></script>
    <script>
      (function () {
        const payload = window.PREREQ_GRAPH;
        if (!payload) {
          return;
        }

        const nodes = payload.nodes || [];
        const links = payload.links || [];

        const parents = new Map(nodes.map((node) => [node.id, []]));
        links.forEach((link) => {
          const list = parents.get(link.target);
          if (list) {
            list.push(link.source);
          }
        });

        const dag = d3
          .dagStratify()
          .id((d) => d.id)
          .parentIds((d) => parents.get(d.id) || [])(nodes);

        const width = document.getElementById("graph").clientWidth;
        const height = document.getElementById("graph").clientHeight;

        const layout = d3
          .sugiyama()
          .nodeSize([120, 60])
          .layering(d3.layeringLongestPath())
          .decross(d3.decrossTwoLayer())
          .coord(d3.coordVert())
          .size([width - 80, height - 80]);

        layout(dag);

        const svg = d3.select("#graph");
        svg.attr("viewBox", [0, 0, width, height].join(" "));

        const zoomLayer = svg.append("g").attr("transform", "translate(40,40)");

        svg.call(
          d3
            .zoom()
            .scaleExtent([0.2, 3])
            .on("zoom", (event) => zoomLayer.attr("transform", event.transform))
        );

        zoomLayer
          .append("g")
          .selectAll("path")
          .data(dag.links())
          .join("path")
          .attr("class", "link")
          .attr(
            "d",
            d3
              .line()
              .x((d) => d.x)
              .y((d) => d.y)
              .curve(d3.curveCatmullRom)
          );

        const nodeGroup = zoomLayer
          .append("g")
          .selectAll("g")
          .data(dag.descendants())
          .join("g")
          .attr("class", "node")
          .attr("transform", (d) => `translate(${d.x},${d.y})`);

        nodeGroup.each(function (d) {
          const node = d.data;
          const shape = node.shape || "box";
          const color = node.color || "#6c757d";
          const group = d3.select(this);
          if (shape === "ellipse") {
            group
              .append("ellipse")
              .attr("rx", 55)
              .attr("ry", 22)
              .attr("stroke", color);
          } else {
            group
              .append("rect")
              .attr("x", -55)
              .attr("y", -22)
              .attr("width", 110)
              .attr("height", 44)
              .attr("rx", 6)
              .attr("stroke", color);
          }
        });

        nodeGroup
          .append("text")
          .attr("text-anchor", "middle")
          .attr("dy", "0.35em")
          .text((d) => d.data.label);
      })();
    </script>
  </body>
</html>
