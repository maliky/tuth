map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tusis_preprod_app {
    server 127.0.0.1:18000 fail_timeout=0;
}

server {
    listen 54.36.60.51:80;
    listen [2001:41d0:303:4233::1]:80;
    server_name sis.wvstu.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 54.36.60.51:443 ssl http2;
    listen [2001:41d0:303:4233::1]:443 ssl http2;
    server_name sis.wvstu.online;

    ssl_certificate /etc/letsencrypt/live/sis.wvstu.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sis.wvstu.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    access_log /var/log/nginx/sis.wvstu.online.access.log;
    error_log  /var/log/nginx/sis.wvstu.online.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location /static/ {
        alias /home/jil/Tusis/Tusis_app/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /home/jil/Tusis/Tusis_app/media/;
        expires 1d;
    }

    location /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        proxy_pass http://tusis_preprod_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_redirect off;
        proxy_read_timeout 600s;
    }
}
